<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toj Chat — Чат бо Забони Тоҷикӣ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f0f2f5; }
        #sidebar { width: 260px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background-color: #1a252f; font-size: 18px; font-weight: bold; text-align: center; }
        #room-list { flex: 1; overflow-y: auto; list-style: none; }
        .room-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.2s; }
        .room-item:hover, .room-item.active { background-color: #3498db; }
        .actions { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        input, button { padding: 10px; border: none; border-radius: 5px; outline: none; }
        button { background-color: #e74c3c; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #c0392b; }
        #create-room-btn { background-color: #2ecc71; }
        #create-room-btn:hover { background-color: #27ae60; }
        
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #efeae2; }
        #chat-header { padding: 15px; background-color: white; border-bottom: 1px solid #ddd; font-size: 18px; font-weight: bold; color: #333; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 60%; padding: 10px 14px; border-radius: 10px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.sent { background-color: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg.received { background-color: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg-user { font-size: 12px; font-weight: bold; color: #e67e22; margin-bottom: 3px; }
        
        #input-area { padding: 15px; background-color: #f0f2f5; display: flex; gap: 10px; }
        #msg-input { flex: 1; border: 1px solid #ccc; }
        #send-btn { background-color: #3498db; width: 100px; }
        #send-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">TOJ CHAT 🇹🇯</div>
        <ul id="room-list"></ul>
        <div class="actions">
            <input type="text" id="username-input" placeholder="Номи шумо...">
            <input type="text" id="new-room-input" placeholder="Номи комната...">
            <button id="create-room-btn">Сохтани Комната</button>
        </div>
    </div>

    <div id="chat-area">
        <div id="chat-header">Интихоби комната...</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Паёми худро нависед..." disabled>
            <button id="send-btn" disabled>Фиристодан</button>
        </div>
    </div>

    <!-- Пайваст кардани Firebase (Кодҳои нави зинда) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Конфигуратсияи Firebase-и ТУ
        const firebaseConfig = {
            apiKey: "AIzaSyDPIaHuOYaee3O4hsbsuUTdMPsDlRel3yk",
            authDomain: "toj-chat-live.firebaseapp.com",
            databaseURL: "https://toj-chat-live-default-rtdb.firebaseio.com",
            projectId: "toj-chat-live",
            storageBucket: "toj-chat-live.firebasestorage.app",
            messagingSenderId: "195141807915",
            appId: "1:195141807915:web:eec70d00e94e287a07df6e"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Элементҳо
        const roomList = document.getElementById('room-list');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const usernameInput = document.getElementById('username-input');
        const newRoomInput = document.getElementById('new-room-input');
        const createRoomBtn = document.getElementById('create-room-btn');
        const chatHeader = document.getElementById('chat-header');

        let currentRoom = '';
        let username = localStorage.getItem('chat_username') || '';
        if(username) usernameInput.value = username;

        // Сабти ном
        usernameInput.addEventListener('input', () => {
            username = usernameInput.value.trim();
            localStorage.setItem('chat_username', username);
        });

        // Боркунии комнатаҳо аз Firebase
        db.ref('rooms').on('value', snapshot => {
            roomList.innerHTML = '';
            const rooms = snapshot.val();
            if (rooms) {
                Object.keys(rooms).forEach(roomName => {
                    const li = document.createElement('li');
                    li.classList.add('room-item');
                    if(roomName === currentRoom) li.classList.add('active');
                    li.textContent = roomName;
                    li.onclick = () => switchRoom(roomName);
                    roomList.appendChild(li);
                });
            }
        });

        // Сохтани комнатаи нав
        createRoomBtn.onclick = () => {
            const roomName = newRoomInput.value.trim();
            if(roomName) {
                db.ref('rooms/' + roomName).textarea = true; // сохтани папкаи холӣ
                db.ref('rooms/' + roomName).push({
                    user: 'Система',
                    text: `Комнатаи "${roomName}" сохта шуд!`
                });
                newRoomInput.value = '';
                switchRoom(roomName);
            }
        };

        // Иваз кардани комната
        function switchRoom(roomName) {
            currentRoom = roomName;
            chatHeader.textContent = `Комната: ${roomName}`;
            msgInput.disabled = false;
            sendBtn.disabled = false;
            
            // Тоза кардани активҳо дар меню
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            
            // Бор кардани паёмҳо барои ин комната
            db.ref('rooms/' + currentRoom).off(); // хомӯш кардани шунавандаи кӯҳна
            db.ref('rooms/' + currentRoom).on('value', snapshot => {
                messagesDiv.innerHTML = '';
                const messages = snapshot.val();
                if (messages) {
                    Object.values(messages).forEach(msg => {
                        if(msg.text) {
                            const div = document.createElement('div');
                            div.classList.add('msg');
                            
                            // Муайян кардани кӣ фиристод
                            if(msg.user === username) {
                                div.classList.add('sent');
                            } else {
                                div.classList.add('received');
                            }

                            div.innerHTML = `<div class="msg-user">${msg.user}</div><div>${msg.text}</div>`;
                            messagesDiv.appendChild(div);
                        }
                    });
                    messagesDiv.scrollTop = messagesDiv.scrollHeight; // Скролл ба поён
                }
            });
        }

        // Фиристодани паём
        function sendMessage() {
            const text = msgInput.value.trim();
            const user = username.trim() || 'Аноним';
            if (text && currentRoom) {
                db.ref('rooms/' + currentRoom).push({
                    user: user,
                    text: text
                });
                msgInput.value = '';
            }
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
